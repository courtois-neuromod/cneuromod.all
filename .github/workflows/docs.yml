name: Deploy Sphinx Docs to Pages

on:
  push:
    branches: ["main"] # Triggers on push to your default main branch
  workflow_dispatch:   # Allows you to run this workflow manually from the Actions tab

# Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress for the same branch
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Automatically caches installed pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install docs/

      - name: Build HTML documentation
        run: |
          # Compiles your .rst/.md files into the static HTML site
          # Replace 'docs' and 'docs/_build/html' with your source and output paths if different
          sphinx-build -b html docs/source docs/_build/html

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to the output HTML directory from the step above
          path: 'docs/_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
